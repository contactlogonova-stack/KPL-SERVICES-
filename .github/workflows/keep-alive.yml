name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://cgyzykbffyyxevkkoyir.supabase.co/rest/v1/categories?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Status code: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Erreur : status $STATUS"
            exit 1
          fi
